<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmbraFlux | Global Cyber Security Agency</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Your Matrix CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Additional Professional CSS Overlay -->
    <style>
        /* PROFESSIONAL OVERRIDES FOR AGENCY LOOK */
        
        /* Typography Upgrade */
        body {
            font-family: 'Rajdhani', sans-serif !important;
        }
        h1, h2, h3, h4, .logo, .glitch-text, .nav-links a {
            font-family: 'Orbitron', monospace !important;
        }
        
        /* Remove default section padding to use better layout */
        section {
            min-height: 100vh;
            padding: 120px 50px 80px !important;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            border-bottom: none !important;
            position: relative;
        }
        
        /* Premium Glassmorphism Navigation */
        header {
            background: rgba(0, 0, 0, 0.85) !important;
            backdrop-filter: blur(20px) !important;
            border-bottom: 1px solid rgba(0, 255, 102, 0.3) !important;
            padding: 15px 60px !important;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.1);
        }
        
        .logo {
            font-size: 28px !important;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #00FF66, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none !important;
        }
        
        .logo i {
            -webkit-text-fill-color: #00FF66;
            margin-right: 10px;
        }
        
        /* Professional Navigation Links */
        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }
        
        .nav-links a {
            color: #aaffcc !important;
            text-decoration: none;
            font-size: 15px !important;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
            text-shadow: none !important;
        }
        
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00FF66;
            transition: 0.3s;
        }
        
        .nav-links a:hover::after {
            width: 100%;
        }
        
        .nav-links a:hover {
            color: #00FF66 !important;
        }
        
        .nav-cta {
            background: #00FF66 !important;
            color: #000 !important;
            padding: 8px 25px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            border: none !important;
        }
        
        .nav-cta::after {
            display: none !important;
        }
        
        .nav-cta:hover {
            background: #00cc52 !important;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4) !important;
            color: #000 !important;
        }
        
        /* Hero Section - Global Agency */
        .hero-agency {
            min-height: 100vh !important;
            justify-content: center !important;
            padding: 0 50px !important;
            text-align: center;
            position: relative;
        }
        
        .hero-agency h1 {
            font-size: 72px !important;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00FF66, #00cc66, #00FF66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(0, 255, 102, 0.3) !important;
            animation: none !important;
        }
        
        .hero-subtitle {
            font-size: 22px !important;
            color: #aaffcc;
            letter-spacing: 4px;
            margin-bottom: 15px;
            font-weight: 300;
        }
        
        .hero-tagline {
            font-size: 16px;
            color: #66ffaa;
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.8;
            opacity: 0.8;
        }
        
        .hero-badges {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }
        
        .hero-badge {
            background: rgba(0, 255, 102, 0.08);
            border: 1px solid rgba(0, 255, 102, 0.2);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 13px;
            color: #aaffcc;
            letter-spacing: 1px;
        }
        
        .hero-badge i {
            color: #00FF66;
            margin-right: 8px;
        }
        
        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-primary {
            background: #00FF66 !important;
            color: #000 !important;
            padding: 16px 45px !important;
            border-radius: 50px !important;
            font-weight: 700 !important;
            font-size: 16px !important;
            letter-spacing: 1px;
            border: none !important;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px) !important;
            box-shadow: 0 0 60px rgba(0, 255, 102, 0.4) !important;
        }
        
        .btn-secondary {
            background: transparent !important;
            color: #00FF66 !important;
            padding: 16px 45px !important;
            border-radius: 50px !important;
            border: 2px solid #00FF66 !important;
            font-weight: 700 !important;
            font-size: 16px !important;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 255, 102, 0.1) !important;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.2) !important;
        }
        
        /* Section Titles */
        .section-title {
            font-size: 42px !important;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 15px !important;
            color: #00FF66 !important;
            text-shadow: 0 0 30px rgba(0, 255, 102, 0.2) !important;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: #00FF66;
            margin: 15px auto 0;
            box-shadow: 0 0 20px #00FF66;
        }
        
        .section-subtitle {
            color: #66ffaa;
            font-size: 18px;
            margin-bottom: 50px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        
        /* Services / Cards Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
        }
        
        .service-card {
            background: rgba(5, 5, 5, 0.9);
            border: 1px solid rgba(0, 255, 102, 0.15);
            padding: 40px 30px;
            border-radius: 12px;
            text-align: left;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00FF66, transparent);
        }
        
        .service-card:hover {
            transform: translateY(-8px);
            border-color: #00FF66;
            box-shadow: 0 20px 60px rgba(0, 255, 102, 0.1);
        }
        
        .service-icon {
            font-size: 36px;
            color: #00FF66;
            margin-bottom: 20px;
        }
        
        .service-card h3 {
            font-size: 22px;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .service-card p {
            color: #88ccaa;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 0;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        .service-tag {
            display: inline-block;
            margin-top: 15px;
            font-size: 12px;
            color: #00FF66;
            border: 1px solid rgba(0, 255, 102, 0.3);
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
        
        /* Stats Section */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
            margin-top: 30px;
        }
        
        .stat-item {
            text-align: center;
            padding: 30px 20px;
            background: rgba(5, 5, 5, 0.6);
            border: 1px solid rgba(0, 255, 102, 0.1);
            border-radius: 10px;
        }
        
        .stat-item h3 {
            font-size: 48px !important;
            color: #00FF66;
            text-shadow: 0 0 30px rgba(0, 255, 102, 0.2);
            margin-bottom: 5px !important;
        }
        
        .stat-item p {
            color: #88ccaa;
            font-size: 14px;
            letter-spacing: 1px;
            margin-bottom: 0 !important;
            text-transform: uppercase;
        }
        
        /* Testimonials / Trust */
        .trust-section {
            background: rgba(0, 0, 0, 0.5);
            padding: 60px 0 !important;
            min-height: auto !important;
            border-top: 1px solid rgba(0, 255, 102, 0.1);
            border-bottom: 1px solid rgba(0, 255, 102, 0.1);
        }
        
        .trust-logos {
            display: flex;
            gap: 50px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0.6;
        }
        
        .trust-logos span {
            font-size: 14px;
            letter-spacing: 2px;
            color: #66ffaa;
            font-weight: 600;
        }
        
        /* Support Form - Professional */
        .support-wrapper {
            width: 100%;
            max-width: 600px;
            background: rgba(5, 5, 5, 0.8);
            border: 1px solid rgba(0, 255, 102, 0.15);
            padding: 50px;
            border-radius: 12px;
        }
        
        .support-wrapper h3 {
            color: #00FF66;
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        
        .support-wrapper p {
            color: #88ccaa;
            font-size: 14px;
            margin-bottom: 25px;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        form.support-form input, 
        form.support-form textarea {
            background: #0a0a0a !important;
            border: 1px solid rgba(0, 255, 102, 0.2) !important;
            padding: 14px !important;
            border-radius: 6px !important;
            color: #aaffcc !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 15px;
            transition: 0.3s;
        }
        
        form.support-form input:focus, 
        form.support-form textarea:focus {
            border-color: #00FF66 !important;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.05);
        }
        
        form.support-form button {
            padding: 14px !important;
            border-radius: 50px !important;
            background: #00FF66 !important;
            color: #000 !important;
            font-weight: 700 !important;
            font-size: 16px;
            letter-spacing: 1px;
            border: none !important;
            transition: 0.3s;
        }
        
        form.support-form button:hover {
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.3) !important;
            transform: translateY(-2px);
        }
        
        /* Footer - Professional */
        footer {
            background: #000 !important;
            border-top: 1px solid rgba(0, 255, 102, 0.15) !important;
            padding: 60px 50px 30px !important;
            text-align: left !important;
        }
        
        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 50px;
            max-width: 1200px;
            margin: 0 auto 40px;
        }
        
        .footer-brand h3 {
            font-size: 24px;
            color: #00FF66;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        .footer-brand p {
            color: #66aa88;
            font-size: 14px;
            line-height: 1.8;
            max-width: 300px;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        .footer-col h4 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        
        .footer-col a {
            display: block;
            color: #66aa88;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
            transition: 0.3s;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        .footer-col a:hover {
            color: #00FF66;
            transform: translateX(5px);
        }
        
        .footer-bottom {
            border-top: 1px solid rgba(0, 255, 102, 0.1);
            padding-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .footer-bottom p {
            color: #448866;
            font-size: 13px;
            margin-bottom: 0 !important;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        .footer-social a {
            color: #66aa88;
            font-size: 20px;
            margin-left: 20px;
            transition: 0.3s;
        }
        
        .footer-social a:hover {
            color: #00FF66;
            text-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
        }
        
        /* Login Overlay - Premium */
        .login-box {
            background: rgba(5, 5, 5, 0.95) !important;
            border: 1px solid #00FF66 !important;
            padding: 50px !important;
            width: 400px !important;
            border-radius: 12px !important;
            box-shadow: 0 0 60px rgba(0, 255, 102, 0.15) !important;
            backdrop-filter: blur(10px);
        }
        
        .login-box h2 {
            font-size: 28px !important;
            letter-spacing: 3px;
            margin-bottom: 30px !important;
        }
        
        .login-box input {
            padding: 14px !important;
            margin: 12px 0 !important;
            border-radius: 6px !important;
            background: #0a0a0a !important;
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 15px;
        }
        
        .login-box button {
            padding: 14px !important;
            border-radius: 50px !important;
            font-size: 16px !important;
            letter-spacing: 1px;
            margin-top: 15px !important;
        }
        
        .login-box .login-sub {
            color: #66aa88;
            font-size: 13px;
            margin-top: 15px;
            font-family: 'Rajdhani', sans-serif !important;
        }
        
        /* Responsive */
        @media (max-width: 992px) {
            .footer-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 768px) {
            header {
                padding: 15px 20px !important;
                flex-direction: column;
                gap: 15px;
            }
            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero-agency h1 {
                font-size: 40px !important;
                letter-spacing: 3px;
            }
            .hero-agency {
                padding: 100px 20px !important;
            }
            section {
                padding: 80px 20px !important;
            }
            .section-title {
                font-size: 30px !important;
            }
            .support-wrapper {
                padding: 30px 20px;
            }
            .login-box {
                width: 90% !important;
                padding: 30px !important;
            }
            .footer-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .footer-bottom {
                flex-direction: column;
                text-align: center;
            }
            .footer-social a {
                margin: 0 10px;
            }
        }
        
        /* Glitch animation for logo */
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }
        
        .glitch {
            animation: glitch 4s infinite;
        }
    </style>
</head>
<body>

    <!-- Matrix Canvas (your existing JS will use this) -->
    <canvas id="matrix"></canvas>

    <!-- ===== LOGIN OVERLAY ===== -->
    <div id="auth-overlay">
        <div class="login-box">
            <h2><i class="fas fa-shield-halved"></i> UMBRAFLUX</h2>
            <p style="color: #88ccaa; font-size: 14px; margin-bottom: 20px;">Global Cyber Security Agency</p>
            <form id="login-form">
                <input type="text" id="login-user" placeholder="Agent ID / Username" required>
                <input type="password" id="login-pass" placeholder="Access Code" required>
                <button type="submit"><i class="fas fa-key"></i> DECRYPT ACCESS</button>
            </form>
            <p class="login-sub">🔒 Encrypted channel • 256-bit secure</p>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div id="main-content">
        
        <!-- HEADER -->
        <header>
            <div class="logo">
                <i class="fas fa-shield-halved"></i> UMBRAFLUX
            </div>
            <ul class="nav-links">
                <li><a href="#home">HOME</a></li>
                <li><a href="#services">SERVICES</a></li>
                <li><a href="#stats">STATS</a></li>
                <li><a href="#support">CONTACT</a></li>
                <li><a href="#support" class="nav-cta">GET ACCESS</a></li>
            </ul>
